<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="rose-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F4B8C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Petal icon -->
  <g transform="translate(30, 50)">
    <ellipse cx="-8" cy="0" rx="14" ry="22" transform="rotate(-30)" fill="url(#rose-light)" opacity="0.7"/>
    <ellipse cx="8" cy="0" rx="14" ry="22" transform="rotate(30)" fill="url(#rose-light)" opacity="0.85"/>
    <ellipse cx="0" cy="-5" rx="10" ry="20" fill="#F4B8C1" opacity="0.9"/>
    <circle cx="0" cy="-2" r="3" fill="#ffffff"/>
  </g>

  <!-- Brand name -->
  <text x="70" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="400" letter-spacing="6" fill="#ffffff">
    CÉLYSÉ
  </text>

  <!-- Tagline -->
  <text x="72" y="82" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300" letter-spacing="4" fill="#F4B8C1">
    KOREAN SPICULE SKINCARE
  </text>
</svg>